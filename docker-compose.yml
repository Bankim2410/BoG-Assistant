version: "3.9"

services:
  backend:
    build: ./Backend
    ports:
      - "8000:8000"
    env_file:
      - ./Backend/.env
    depends_on:
      - postgres
    restart: unless-stopped

  # ─── LOCAL POSTGRES (remove if using managed RDS) ───────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       bog_assist
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pg_data:
